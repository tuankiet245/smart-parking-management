<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Cache - Parking System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 3rem 2rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .status {
            font-size: 4rem;
            margin: 2rem 0;
        }

        #message {
            font-size: 1.2rem;
            margin: 1.5rem 0;
            line-height: 1.6;
        }

        .log {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 1rem;
            margin-top: 2rem;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-item {
            padding: 0.25rem 0;
        }

        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🧹 Xóa Cache</h1>
        <div class="status" id="status">⏳</div>
        <div id="message">Đang xóa cache...</div>
        <div class="log" id="log"></div>
        <button id="reloadBtn" disabled onclick="window.location.href='/admin'">
            Vào trang Admin
        </button>
    </div>

    <script>
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        const message = document.getElementById('message');
        const reloadBtn = document.getElementById('reloadBtn');

        function addLog(text) {
            const item = document.createElement('div');
            item.className = 'log-item';
            item.textContent = `✓ ${text}`;
            log.appendChild(item);
            log.scrollTop = log.scrollHeight;
        }

        async function clearEverything() {
            try {
                // 1. Unregister Service Workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                        addLog(`Unregistered service worker: ${registration.scope}`);
                    }
                    if (registrations.length === 0) {
                        addLog('No service workers found');
                    }
                }

                // 2. Clear all caches
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    for (let name of cacheNames) {
                        await caches.delete(name);
                        addLog(`Deleted cache: ${name}`);
                    }
                    if (cacheNames.length === 0) {
                        addLog('No caches found');
                    }
                }

                // 3. Clear localStorage
                localStorage.clear();
                addLog('Cleared localStorage');

                // 4. Clear sessionStorage
                sessionStorage.clear();
                addLog('Cleared sessionStorage');

                // Success!
                status.textContent = '✅';
                message.innerHTML = '<strong>Hoàn tất!</strong><br>Tất cả cache đã được xóa.';
                reloadBtn.disabled = false;

                addLog('=== ALL DONE ===');

            } catch (error) {
                status.textContent = '❌';
                message.textContent = 'Lỗi: ' + error.message;
                addLog('ERROR: ' + error.message);
            }
        }

        // Auto-start on page load
        window.addEventListener('load', () => {
            setTimeout(clearEverything, 500);
        });
    </script>
</body>

</html>
